 * This is a general purpose Gradle build.
 * Learn more about Gradle by exploring our samples at https://docs.gradle.org/7.5/samples
 */
plugins {
    id 'java'
    id 'application'
    id "org.sonarqube" version "4.4.1.3373"
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
}

test {
    useJUnitPlatform()
}

application {
    mainClass = 'com.java.ShoppingCartApplication'
}
sonarqube {
    properties {
        property "sonar.projectKey", "anandmohansinha_shopping-cart"
        property "sonar.organization", "anandmohansinha"
        property "sonar.host.url", "https://sonarcloud.io"
    }
}